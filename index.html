<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student View — Result Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root { --bg: #0a0e1a; --card: #111827; --border: #1e2d45; --accent: #3b82f6; --accent2: #06b6d4; --green: #10b981; --red: #ef4444; --text: #f1f5f9; --muted: #64748b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  .nav { position:fixed; top:0; left:0; right:0; z-index:100; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; background:rgba(10,14,26,0.85); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; }
  .logo span { color:var(--accent); }
  .btn-logout { background:none; border:1px solid var(--border); color:var(--muted); padding:0.4rem 0.8rem; border-radius:6px; cursor:pointer; font-size:0.8rem; }

  .hero { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8rem 1rem 3rem; }
  h1 { font-family:'Syne',sans-serif; font-size:2.2rem; margin-bottom:1.5rem; text-align:center; }

  #resultSection { width:100%; max-width:700px; }
  .result-card { background:var(--card); border:1px solid var(--border); border-radius:20px; overflow:hidden; box-shadow:0 25px 60px rgba(0,0,0,0.4); }
  .result-header { padding:2rem; background:linear-gradient(135deg, rgba(59,130,246,0.15), rgba(6,182,212,0.1)); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }
  
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); border-bottom:1px solid var(--border); }
  .stat-item { padding:1.2rem; text-align:center; border-right:1px solid var(--border); }
  .stat-item:last-child { border-right:none; }
  .stat-value { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:700; }
  .stat-label { font-size:0.75rem; color:var(--muted); }

  table { width:100%; border-collapse:collapse; }
  th, td { padding:1rem; font-size:0.9rem; text-align:left; }
  td { border-top:1px solid var(--border); }
  .progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; width: 80px; }
  .progress-fill { height:100%; }
</style>
</head>
<body>

<nav class="nav">
  <div class="logo">Result<span>Portal</span></div>
  <div><button class="btn-logout" onclick="logout()">Sign Out</button></div>
</nav>

<section class="hero">
  <h1 id="welcomeTitle">Loading Performance Sheet...</h1>
  <div id="resultSection">
    <div style="text-align:center; color:var(--muted);">Accessing database metrics record values securely...</div>
  </div>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⚠️ REPLACE WITH YOUR REAL FIREBASE DETAILS HERE
  const firebaseConfig = {
    apiKey: "AIzaSyD8Wr7Vxfe_GPjHTio9MXZGU-8SnOByb7Y",
    authDomain: "result-7e39d.firebaseapp.com",
    projectId: "result-7e39d",
    storageBucket: "result-7e39d.firebasestorage.app",
    messagingSenderId: "595440815648",
    appId: "1:595440815648:web:1930aca4bf823e73a2f645",
    measurementId: "G-MFS9J808H7"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window._db = db; window._getDoc = getDoc; window._doc = doc;
  loadDirectStudentProfile();
</script>

<script>
  async function loadDirectStudentProfile() {
    const role = sessionStorage.getItem('userRole');
    const roll = sessionStorage.getItem('studentRoll');

    if (role !== 'student' || !roll) {
      window.location.href = 'login.html';
      return;
    }

    try {
      const snap = await window._getDoc(window._doc(window._db, 'students', roll));
      if (!snap.exists()) {
        document.getElementById('resultSection').innerHTML = "<div class='result-card' style='padding:2rem;'>❌ No scorecard found.</div>";
        return;
      }
      displayResult(snap.data());
    } catch(e) {
      document.getElementById('resultSection').innerHTML = "⚠️ Configuration mismatch.";
    }
  }

  function displayResult(s) {
    document.getElementById('welcomeTitle').textContent = `Welcome, ${s.name}`;
    const subjectsList = s.subjects || [];
    const total = subjectsList.reduce((a,b) => a + b.obtained_marks, 0);
    const full = subjectsList.reduce((a,b) => a + b.full_marks, 0);
    const pct = full ? ((total/full)*100).toFixed(1) : 0;
    const passed = subjectsList.every(sub => sub.obtained_marks >= sub.pass_marks);

    const rows = subjectsList.map(sub => `
      <tr>
        <td><b>${sub.name}</b></td><td>${sub.full_marks}</td><td>${sub.pass_marks}</td>
        <td style="color:${sub.obtained_marks >= sub.pass_marks ? '#10b981':'#ef4444'}; font-weight:600;">${sub.obtained_marks}</td>
        <td><div class="progress-bar"><div class="progress-fill" style="width:${(sub.obtained_marks/sub.full_marks)*100}%;background:${sub.obtained_marks >= sub.pass_marks?'#10b981':'#ef4444'}"></div></div></td>
      </tr>`).join('');

    document.getElementById('resultSection').innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <h3>Academic Performance</h3>
          <p style="color:var(--accent2); font-weight:600;">${s.roll_no} · Sem ${s.semester} · ${s.faculty}</p>
        </div>
        <div class="stats-row">
          <div class="stat-item"><div class="stat-value">${total}/${full}</div><div class="stat-label">Aggregated Marks</div></div>
          <div class="stat-item"><div class="stat-value">${pct}%</div><div class="stat-label">Percentage</div></div>
          <div class="stat-item"><div class="stat-value" style="color:${passed?'#10b981':'#ef4444'}">${passed?'PASS':'FAIL'}</div><div class="stat-label">Outcome</div></div>
        </div>
        <div style="padding:1rem; overflow-x:auto;">
          <table>
            <thead><tr><th>Subject</th><th>Full</th><th>Pass</th><th>Obtained</th><th>Graph</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
</script>
</body>
</html>
