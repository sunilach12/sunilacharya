<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Panel — Result Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0a0e1a; --card:#111827; --border:#1e2d45; --accent:#06b6d4; --green:#10b981; --red:#ef4444; --text:#f1f5f9; --muted:#64748b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  .topbar { position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center; }
  .logo { font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem; }
  .logo span { color:var(--accent); }
  .topbar-right { display:flex;align-items:center;gap:1rem;font-size:0.85rem;color:var(--muted); }
  .badge-role { background:rgba(6,182,212,0.15);color:var(--accent);padding:0.2rem 0.6rem;border-radius:4px;font-size:0.75rem;font-weight:600; }
  .btn-logout { background:none;border:1px solid var(--border);color:var(--muted);padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;font-size:0.8rem;transition:all 0.2s; }
  .btn-logout:hover { border-color:var(--red);color:var(--red); }

  .main { max-width:900px;margin:0 auto;padding:2.5rem 1.5rem; }
  .page-header { margin-bottom:2rem; }
  .page-header h1 { font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:0.3rem; }
  .page-header p { color:var(--muted); }

  .tabs { display:flex;gap:0.5rem;margin-bottom:2rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;width:fit-content; }
  .tab { padding:0.6rem 1.2rem;border-radius:8px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;transition:all 0.2s; }
  .tab.active { background:var(--accent);color:#000;font-weight:600; }

  .section { display:none; }
  .section.active { display:block;animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .card { background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.5rem; }
  .card h3 { font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1.2rem; }

  .form-group { margin-bottom:1rem; }
  .form-group label { display:block;font-size:0.75rem;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.04em; }
  .form-group input, .form-group select { width:100%;padding:0.75rem 1rem;background:#0d1526;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s; }
  .form-row { display:grid;grid-template-columns:1fr 1fr;gap:1rem; }

  .btn { padding:0.75rem 1.5rem;border-radius:8px;font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),#0891b2);color:#000;box-shadow:0 4px 15px rgba(6,182,212,0.3); }
  .btn-secondary { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--muted); }
  .btn-enter { background: rgba(6,182,212,0.15); color: var(--accent); border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }

  .table-responsive { width: 100%; overflow-x: auto; }
  .marks-table { width:100%;border-collapse:collapse; }
  .marks-table th { text-align:left;font-size:0.7rem;color:var(--muted);padding:0.6rem 0.75rem;border-bottom:1px solid var(--border); }
  .marks-table td { padding:0.6rem 0.75rem;border-bottom:1px solid rgba(30,45,69,0.4); }
  .marks-table input { width:80px;padding:0.5rem;background:#0d1526;border:1px solid var(--border);border-radius:6px;color:var(--text);text-align:center;outline:none; }

  .student-info-bar { background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.2);border-radius:10px;padding:1rem;margin-bottom:1.2rem;display:flex;gap:2rem;flex-wrap:wrap; }
  .student-list-item { display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1rem;border-bottom:1px solid rgba(30,45,69,0.4);flex-wrap: wrap; gap: 0.5rem; }
  .marks-status { font-size:0.75rem;padding:0.2rem 0.5rem;border-radius:4px; }
  .marks-done { background:rgba(16,185,129,0.1);color:var(--green); }
  .toast { position:fixed;bottom:2rem;right:2rem;background:var(--card);border:1px solid var(--green);color:var(--green);padding:0.75rem 1.2rem;border-radius:10px;display:none;z-index:1000; }

  @media (max-width: 600px) {
    .topbar { padding: 1rem; }
    .main { padding: 1rem 0.5rem; }
    .form-row { grid-template-columns: 1fr; }
    .student-info-bar { gap: 0.8rem; flex-direction: column; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Result<span>Portal</span> <span style="font-size:0.7rem;color:var(--muted);font-weight:400;margin-left:4px">Faculty Deck</span></div>
  <div class="topbar-right">
    <span id="userName">Teacher</span>
    <span class="badge-role">TEACHER</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="main">
  <div class="page-header">
    <h1>Instructor Ledger Matrix</h1>
    <p>Select and record metrics for verified students below.</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('enterMarks',this)">✏️ Enter Marks</button>
    <button class="tab" onclick="showTab('myStudents',this)">👥 My Students</button>
  </div>

  <div class="section active" id="tab-enterMarks">
    <div class="card">
      <h3>🔍 Look Up Profile</h3>
      <div class="form-row">
        <div class="form-group"><label>Student Roll Number</label><input type="text" id="searchRoll" placeholder="e.g. BCA001"/></div>
      </div><br/>
      <button class="btn btn-primary" onclick="findStudent()">Query Database Log</button>
    </div>

    <div id="marksEntryArea" style="display:none">
      <div class="card">
        <h3>📝 Evaluation Registry</h3>
        <div class="student-info-bar" id="studentInfoBar"></div>
        <div class="table-responsive">
          <table class="marks-table">
            <thead><tr><th>Subject Identity</th><th>Full Max</th><th>Pass Mark</th><th>Obtained Score</th><th>Verification</th></tr></thead>
            <tbody id="marksTableBody"></tbody>
          </table>
        </div>
        <div style="margin-top:1.5rem;display:flex;gap:1rem">
          <button class="btn btn-primary" onclick="saveMarks()">💾 Save Scorecard</button>
          <button class="btn btn-secondary" onclick="cancelMarks()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div class="section" id="tab-myStudents">
    <div class="card" style="padding:0;overflow:hidden">
      <div id="myStudentsList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ⚠️ REPLACE WITH YOUR REAL FIREBASE DETAILS HERE
  const firebaseConfig = {
    apiKey: "AIzaSyD8Wr7Vxfe_GPjHTio9MXZGU-8SnOByb7Y",
    authDomain: "result-7e39d.firebaseapp.com",
    projectId: "result-7e39d",
    storageBucket: "result-7e39d.firebasestorage.app",
    messagingSenderId: "595440815648",
    appId: "1:595440815648:web:1930aca4bf823e73a2f645",
    measurementId: "G-MFS9J808H7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  window._db = db; window._fb = { collection, getDocs, doc, getDoc, updateDoc };

  onAuthStateChanged(auth, user => {
    if (!user && sessionStorage.getItem('userRole') !== 'teacher') window.location.href = 'login.html';
  });
</script>

<script>
  let currentStudent = null;
  let allStudents = [];

  document.getElementById('userName').textContent = sessionStorage.getItem('userName') || 'Instructor Account';
  window.addEventListener('load', loadAllStudents);

  function showTab(id, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    if(el) el.classList.add('active');
    if(id === 'myStudents') renderMyStudents(allStudents);
  }

  async function loadAllStudents() {
    try {
      const snap = await window._fb.getDocs(window._fb.collection(window._db,'students'));
      allStudents = snap.docs.map(d => d.data());
      renderMyStudents(allStudents);
    } catch(e) { console.log("Awaiting configuration connections..."); }
  }

  async function findStudent() {
    const roll = document.getElementById('searchRoll').value.trim().toUpperCase();
    if (!roll) return;
    let student = allStudents.find(s => s.roll_no === roll);
    if (!student) {
      try {
        const snap = await window._fb.getDoc(window._fb.doc(window._db,'students',roll));
        if (snap.exists()) student = snap.data();
      } catch(e) {}
    }
    if (!student) { alert('Student profile match was not found.'); return; }
    showMarksEntry(student);
  }

  function showMarksEntry(student) {
    currentStudent = student;
    document.getElementById('marksEntryArea').style.display = 'block';
    document.getElementById('studentInfoBar').innerHTML = `<div class="info-item">Target Profile: <b>${student.name}</b> (${student.roll_no}) · Sem ${student.semester} - ${student.faculty}</div>`;
    
    document.getElementById('marksTableBody').innerHTML = student.subjects.map((sub,i) => `
      <tr>
        <td><b>${sub.name}</b></td><td>${sub.full_marks}</td><td>${sub.pass_marks}</td>
        <td><input type="number" id="marks_${i}" value="${sub.obtained_marks}" max="${sub.full_marks}"/></td>
        <td><span class="marks-status marks-done">Open Log</span></td>
      </tr>`).join('');
  }

  async function saveMarks() {
    if (!currentStudent) return;
    const updated = currentStudent.subjects.map((sub,i) => ({
      ...sub, obtained_marks: parseInt(document.getElementById('marks_'+i).value) || 0
    }));
    try {
      await window._fb.updateDoc(window._fb.doc(window._db,'students',currentStudent.roll_no), { subjects: updated });
      currentStudent.subjects = updated;
      showToast('✓ Records written safely!');
      cancelMarks(); loadAllStudents();
    } catch(e) { alert("Action failed: " + e.message); }
  }

  function cancelMarks() { document.getElementById('marksEntryArea').style.display = 'none'; }
  
  function renderMyStudents(students) {
    const listContainer = document.getElementById('myStudentsList');
    if(students.length === 0) { listContainer.innerHTML = '<p style="padding:1rem;color:var(--muted);">No registered profiles loaded.</p>'; return; }
    
    // Create a local safe function-compatible object layout reference map string
    listContainer.innerHTML = students.map((s, idx) => `
      <div class="student-list-item">
        <div><b>${s.name}</b><br><small>${s.roll_no} · Faculty ${s.faculty} · Sem ${s.semester}</small></div>
        <button class="btn-enter" onclick="loadIndexedStudent(${idx})">Edit Performance Marks</button>
      </div>`).join('');
  }

  window.loadIndexedStudent = function(idx) {
    showTab('enterMarks', document.querySelectorAll('.tab')[0]);
    showMarksEntry(allStudents[idx]);
  };

  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
  function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
</script>
</body>
</html>
